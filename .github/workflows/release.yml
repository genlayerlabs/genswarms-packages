name: release

# Cut a release by pushing a tag: `git tag v0.1.0 && git push origin v0.1.0`.
# Builds the gsp binary for each platform and attaches them to the GitHub
# Release for that tag. Pure `go build` matrix (single static binary, no cgo) —
# no goreleaser dependency to keep it transparent and easy to audit.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        working-directory: cli
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""; [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          out="gsp-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          go build -trimpath -ldflags "-s -w" -o "../${out}" .
          echo "ASSET=${out}" >> "$GITHUB_ENV"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

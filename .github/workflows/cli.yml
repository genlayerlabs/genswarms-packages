name: cli

on:
  push:
    paths: ["cli/**", ".github/workflows/cli.yml"]
  pull_request:
    paths: ["cli/**", ".github/workflows/cli.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
